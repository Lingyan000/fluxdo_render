  真实语料(《Claude Code 终极版 FAQ 指南》官网/中转站 Q&A)。守护两个真机 bug:
  1. 外层 <li> 仅含嵌套 <ol>+<ul>(无直接文本)→ 不能渲染成空 bullet 独占一行,
     直接渲染嵌套子列表(marker 与嵌套首行合并)。
  2. <ol start="2">/<ol start="3"> 续接序号 → marker 必须是 2./3.(不是都 1.)。
  另含 Q(h4)/A(p)块级 li、嵌套 ul、mark 高亮。
